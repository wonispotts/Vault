---
layout: default
---
<article class="post">
  <header class="post-header" style="text-align: center; margin-bottom: 30px;">
    <h1 class="post-title" style="color: #8b0000; font-family: 'Palatino', 'Palatino Linotype', 'Georgia', serif; font-size: 2.5rem; line-height: 1.3;">
      {{ page.title }}
    </h1>
  </header>

  <div class="post-content" style="background-color: #f5f2eb; color: #2b2b2b; font-family: 'Palatino', 'Palatino Linotype', 'Georgia', serif; padding: 20px; border-radius: 4px; text-align: justify; text-justify: inter-word; line-height: 1.8; font-size: 1.2rem;">
    {{ content }}
  </div>
</article>

<style>
  body, .site-header, .page-content, .wrapper, .site-footer {
    background-color: #f5f2eb !important;
  }
  .site-title, .site-nav a {
    color: #8b0000 !important;
    font-family: 'Palatino', serif;
  }
  img {
    display: block;
    margin: 30px auto;
    max-width: 100%;
    height: auto;
    border: 1px solid #dcd1bd;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }
</style>
