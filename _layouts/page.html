---
layout: default
---
<style>
  /* Hides the automatic menu links like "Home" safely */
  .site-nav {
    display: none !important;
  }
  /* Forces the page backgrounds to warm yellowish-ivory */
  html, body, .site-header, .page-content, .wrapper, .site-footer {
    background-color: #fcf9f2 !important;
  }
  /* Sets your title text color to crimson */
  .site-title, .post-title, h1 {
    color: #9e1b1b !important;
    font-family: "Palatino", "Georgia", serif !important;
  }
</style>

<article class="post">
  <header class="post-header" style="text-align: center; margin-bottom: 30px;">
    <h1 class="post-title" style="font-size: 2.5rem; line-height: 1.3;">
      Naked Steps Chapter:<br>History of West Africa, Beauty and the Beasts
    </h1>
  </header>

  <div class="post-content" style="color: #2b2b2b; font-family: 'Palatino', 'Georgia', serif; padding: 10px; text-align: justify; text-justify: inter-word; line-height: 1.85; font-size: 1.2rem;">
    {{ content }}
  </div>
</article>
