---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Woni Spotts Research - Field Log & Archive</title>
  <style>
    /* Immersive Old-World Travelogue Background Setup */
    html, body {
      background-image: url("./Naked-Steps-Chapter-Australia.jpg") !important;
      background-size: cover !important;
      background-attachment: fixed !important;
      background-position: center !important;
      background-repeat: no-repeat !important;
      color: #2b2b2b !important;             /* Charcoal ink text */
      font-family: "Palatino", "Palatino Linotype", "Georgia", serif !important;
      margin: 0;
      padding: 0;
    }
    
    /* Textured Journal Paper Sheet Overlay */
    .explorer-journal-page {
      max-width: 650px;
      margin: 80px auto;
      padding: 70px 50px;
      text-align: center;
      border: 1px solid #c4b99a;
      background-color: rgba(254, 252, 248, 0.95) !important; /* Semi-opaque watercolor paper texture */
      box-shadow: 0 15px 45px rgba(35, 30, 20, 0.2);
      border-radius: 4px;
      position: relative;
    }

    /* Hand-Drawn Intricate Sketchbook Border Trim */
    .explorer-journal-page::before {
      content: "";
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      border: 1px dashed #bba07a;
      pointer-events: none;
    }

    /* Deep Crimson Explorer Branding Title */
    .archive-main-title {
      color: #9e1b1b !important;            
      font-size: 2.8rem;
      font-weight: bold;
      margin-top: 15px;
      margin-bottom: 5px;
      letter-spacing: 0.5px;
    }

    /* Minimalist Journal Subheading Line */
    .archive-subtitle {
      font-size: 1.25rem;
      font-style: italic;
      color: #555555;
      margin-bottom: 60px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Container for Your Custom Explorer Interface Element */
    .expedition-action-vault {
      margin: 40px auto 20px auto;
    }

    /* Premium Antique Wax-Seal Style Navigation Button */
    .wax-seal-button {
      display: inline-block !important;
      background-color: #8a1313 !important;   /* Deep crimson wax color */
      color: #fdfaf2 !important;             /* Cream lettering text */
      font-family: "Palatino", "Georgia", serif !important;
      font-size: 1.4rem !important;
      font-weight: bold !important;
      text-transform: uppercase !important;
      letter-spacing: 2px !important;
      text-decoration: none !important;
      padding: 18px 36px !important;
      border-radius: 50px !important;       /* Gives it that round custom seal look */
      border: 2px solid #6b0d0d !important;
      box-shadow: 0 6px 20px rgba(138, 19, 19, 0.35), inset 0 2px 5px rgba(255,255,255,0.2);
      transition: all 0.2s ease-in-out !important;
      cursor: pointer;
    }

    /* Hover States simulating pressing a physical seal down */
    .wax-seal-button:hover {
      background-color: #a11b1b !important;
      box-shadow: 0 4px 12px rgba(138, 19, 19, 0.5), inset 0 2px 5px rgba(255,255,255,0.3);
      transform: translateY(1px);
    }

    /* Vintage Note Container Details */
    .expedition-note {
      font-size: 1rem;
      color: #666666;
      font-style: italic;
      margin-top: 25px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="explorer-journal-page">
    
    <!-- Header Nomenclature -->
    <h1 class="archive-main-title">Woni Spotts Research</h1>

    <!-- Subtitle Placement -->
    <div class="archive-subtitle">
      Field Logs and Ethnographic Records for <i>Naked Steps: A Timeless Panoramic Ancestral Odyssey</i>
    </div>

    <!-- The Dedicated Explorer Interface Gateway Link -->
    <div class="expedition-action-vault">
      <a href="https://github.com" class="wax-seal-button" target="_blank">Open Research Log</a>
      <div class="expedition-note">Click the official seal to inspect the underlying research document indexes.</div>
    </div>

  </div>

</body>
</html>
