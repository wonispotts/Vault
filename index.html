---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Woni Spotts Research - Field Log</title>
  <style>
    /* Pulls an authentic museum-archive parchment pattern to force the vintage look instantly */
    html, body {
      background-image: url("https://transparenttextures.com") !important;
      background-color: #f1ebd9 !important; /* Rich Antique Map Canvas Tint */
      background-attachment: fixed !important;
      color: #362e24 !important;             /* Vintage sepia ink text color */
      font-family: "Palatino", "Palatino Linotype", "Georgia", serif !important;
      margin: 0;
      padding: 0;
    }
    
    /* Weathered Explorer Journal Page Envelope */
    .explorer-journal-page {
      max-width: 650px;
      margin: 80px auto;
      padding: 70px 50px;
      text-align: center;
      border: 1px solid #c4b595;
      background-color: #fdfaf2 !important;  /* Pure heavy watercolor paper core */
      box-shadow: 
        0 15px 50px rgba(35, 30, 20, 0.2), 
        inset 0 0 40px rgba(184, 163, 127, 0.15); /* Internal parchment shadow aging effect */
      border-radius: 2px;
      position: relative;
    }

    /* Hand-Inked Dashed Frame Border Details */
    .explorer-journal-page::before {
      content: "";
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      bottom: 18px;
      border: 1px dashed #ad9b79;
      pointer-events: none;
    }

    /* Deep Oxblood Crimson Heading Title */
    .archive-main-title {
      color: #8c1c1c !important;            /* Weathered Oxblood Crimson Ink */
      font-size: 2.8rem;
      font-weight: bold;
      margin-top: 15px;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    /* Elegant Journal Subheading Line */
    .archive-subtitle {
      font-size: 1.25rem;
      font-style: italic;
      color: #5c5243;
      margin-bottom: 50px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Container for your Navigation Instrument Badge */
    .expedition-action-vault {
      margin: 40px auto 20px auto;
    }

    /* Antique Hand-Stamped Explorer Compass Emblem Badge */
    .compass-emblem-button {
      display: inline-block !important;
      text-decoration: none !important;
      color: #8c1c1c !important;            /* Crimson ink lettering */
      font-family: "Palatino", "Georgia", serif !important;
      font-size: 1.25rem !important;
      font-weight: bold !important;
      text-transform: uppercase !important;
      letter-spacing: 2px !important;
      padding: 22px 32px !important;
      border-radius: 4px !important;        
      border: 1px solid #ad9b79 !important; /* Scientific instrument frame detailing */
      background-color: #fdfbf7 !important; /* Aged bone paper background */
      box-shadow: 0 8px 20px rgba(40,35,25,0.08);
      transition: all 0.2s ease-in-out !important;
      cursor: pointer;
    }

    /* Mechanical Compass Component Icon */
    .compass-emblem-button::before {
      content: "🧭 ";                       
      font-size: 1.4rem;
      vertical-align: middle;
      margin-right: 8px;
    }

    /* Press interaction mimicking stamping paper with ink */
    .compass-emblem-button:hover {
      background-color: #f7f3e8 !important;
      border-color: #8c1c1c !important;
    }

    /* Vintage Footnote Spacing */
    .expedition-note {
      font-size: 1rem;
      color: #6e6350;
      font-style: italic;
      margin-top: 30px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="explorer-journal-page">
    
    <!-- Header Nomenclature -->
    <h1 class="archive-main-title">Woni Spotts Research</h1>

    <!-- Subtitle Placement -->
    <div class="archive-subtitle">
      Field Logs and Ethnographic Records for <i>Naked Steps: A Timeless Panoramic Ancestral Odyssey</i>
    </div>

    <!-- The Interactive Navigation Emblem -->
    <div class="expedition-action-vault">
      <a href="https://github.com" class="compass-emblem-button" target="_blank">Examine Research Ledger</a>
      <div class="expedition-note">Break the ledger seal to inspect the underlying research log archives.</div>
    </div>

  </div>

</body>
</html>
